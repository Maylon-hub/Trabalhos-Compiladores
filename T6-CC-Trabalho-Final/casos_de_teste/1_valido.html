<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelArtDSL Render</title>
    <style>
        body { background: #1e1e1e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        svg { shape-rendering: crispEdges; border: 2px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80vmin; height: 80vmin; }
    </style>
</head>
<body>
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" fill="#1E1E1E" />
        <rect x="10" y="10" width="13" height="13" fill="#8BE9FD" />
        <rect x="13" y="14" width="1" height="1" fill="#F8F8F2" />
        <rect x="19" y="14" width="1" height="1" fill="#F8F8F2" />
        <rect x="13" y="15" width="1" height="1" fill="#F8F8F2" />
        <rect x="19" y="15" width="1" height="1" fill="#F8F8F2" />
        <rect x="14" y="15" width="1" height="1" fill="#000000" />
        <rect x="18" y="15" width="1" height="1" fill="#000000" />
        <rect x="14" y="14" width="1" height="1" fill="#000000" />
        <rect x="18" y="14" width="1" height="1" fill="#000000" />
        <line x1="14.5" y1="19.5" x2="18.5" y2="19.5" stroke="#FF5555" stroke-width="1" stroke-linecap="square"/>
        <rect x="13" y="18" width="1" height="1" fill="#FF5555" />
        <rect x="19" y="18" width="1" height="1" fill="#FF5555" />
        <circle cx="28.5" cy="4.5" r="3" fill="#F1FA8C" />
    </svg>
</body>
</html>
