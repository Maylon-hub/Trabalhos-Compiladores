<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelArtDSL Render</title>
    <style>
        body { background: #121214; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: system-ui, -apple-system, sans-serif; }
        svg { shape-rendering: crispEdges; border: 4px solid #1f1f23; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); width: 80vmin; height: 80vmin; background-color: #1e1e1e; }
    </style>
</head>
<body>
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" fill="#1E1E1E" />
        <circle cx="2.5" cy="2.5" r="5" fill="#FF5555" />
        <!-- Instancia de large_square -->
        <g transform="translate(28, 28)">
        <rect x="0" y="0" width="11" height="11" fill="#FF5555" />
        </g>
    </svg>
    <div id="warning-banner" style="position: fixed; top: 20px; right: 20px; background: rgba(255, 179, 0, 0.95); color: #121214; padding: 16px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); z-index: 10000; max-width: 350px; display: flex; flex-direction: column; gap: 8px; transition: all 0.3s ease; height: fit-content; align-self: flex-start;">
        <div style="display: flex; align-items: center; gap: 8px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span>Aviso de Limites</span>
        </div>
        <div style="font-weight: 400; font-size: 13px; opacity: 0.9; line-height: 1.4;">
            Alguns elementos do desenho excedem os limites do canvas. Você pode mover/deslocar a coordenada do elemento se quiser que ele apareça completamente na tela.
        </div>
        <button onclick="document.getElementById('warning-banner').style.display='none'" style="align-self: flex-end; background: none; border: 1px solid #121214; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; color: #121214;">Entendido</button>
    </div>
</body>
</html>
