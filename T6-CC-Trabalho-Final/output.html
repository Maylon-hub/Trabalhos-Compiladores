<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelArtDSL Render</title>
    <style>
        body { background: #121214; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: system-ui, -apple-system, sans-serif; }
        svg { shape-rendering: crispEdges; border: 4px solid #1f1f23; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); width: 80vmin; height: 80vmin; background-color: #1e1e1e; }
    </style>
</head>
<body>
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" fill="#1E1E1E" />
        <polygon points="5.5,5.5 15.5,5.5 10.5,15.5" fill="#FF79C6" />
        <rect x="6.0" y="21.0" width="8" height="8" fill="#BD93F9" />
        <rect x="5" y="35" width="6" height="6" fill="#50FA7B" />
        <polygon points="10.5,44.5 14.5,50.5 10.5,56.5 6.5,50.5" fill="#FF79C6" />
        <!-- Bandeira do Brasil -->
        <g>
            <!-- Retangulo verde -->
            <rect x="25" y="5" width="20" height="14.0" fill="#009739" />
            <!-- Losango amarelo -->
            <polygon points="35.0,6.19 43.3,12.0 35.0,17.81 26.700000000000003,12.0" fill="#FEDD00" />
            <!-- Circulo azul -->
            <circle cx="35.0" cy="12.0" r="3.5" fill="#012169" />
            <!-- Faixa branca em arco -->
            <path d="M 31.64 12.875 Q 35.0 11.65 38.36 11.125" fill="none" stroke="#FFFFFF" stroke-width="0.28" />
        </g>
        <!-- Instancia de smiley -->
        <g transform="translate(45, 15)">
        <circle cx="0.5" cy="0.5" r="6" fill="#F1FA8C" />
        <!-- Instancia de eye -->
        <g transform="translate(-2, -2)">
        <ellipse cx="0.5" cy="0.5" rx="2" ry="1" fill="#FFFFFF" />
        <rect x="0" y="0" width="1" height="1" fill="#000000" />
        </g>
        <!-- Instancia de eye -->
        <g transform="translate(2, -2) scale(-1, 1)">
        <ellipse cx="0.5" cy="0.5" rx="2" ry="1" fill="#FFFFFF" />
        <rect x="0" y="0" width="1" height="1" fill="#000000" />
        </g>
        <line x1="-2.5" y1="2.5" x2="3.5" y2="2.5" stroke="#FF5555" stroke-width="1" stroke-linecap="square"/>
        <rect x="-4" y="1" width="1" height="1" fill="#FF5555" />
        <rect x="4" y="1" width="1" height="1" fill="#FF5555" />
        </g>
        <!-- Instancia de smiley -->
        <g transform="translate(45, 35) rotate(90)">
        <circle cx="0.5" cy="0.5" r="6" fill="#F1FA8C" />
        <!-- Instancia de eye -->
        <g transform="translate(-2, -2)">
        <ellipse cx="0.5" cy="0.5" rx="2" ry="1" fill="#FFFFFF" />
        <rect x="0" y="0" width="1" height="1" fill="#000000" />
        </g>
        <!-- Instancia de eye -->
        <g transform="translate(2, -2) scale(-1, 1)">
        <ellipse cx="0.5" cy="0.5" rx="2" ry="1" fill="#FFFFFF" />
        <rect x="0" y="0" width="1" height="1" fill="#000000" />
        </g>
        <line x1="-2.5" y1="2.5" x2="3.5" y2="2.5" stroke="#FF5555" stroke-width="1" stroke-linecap="square"/>
        <rect x="-4" y="1" width="1" height="1" fill="#FF5555" />
        <rect x="4" y="1" width="1" height="1" fill="#FF5555" />
        </g>
        <!-- Instancia de smiley -->
        <g transform="translate(45, 55) scale(1, -1)">
        <circle cx="0.5" cy="0.5" r="6" fill="#F1FA8C" />
        <!-- Instancia de eye -->
        <g transform="translate(-2, -2)">
        <ellipse cx="0.5" cy="0.5" rx="2" ry="1" fill="#FFFFFF" />
        <rect x="0" y="0" width="1" height="1" fill="#000000" />
        </g>
        <!-- Instancia de eye -->
        <g transform="translate(2, -2) scale(-1, 1)">
        <ellipse cx="0.5" cy="0.5" rx="2" ry="1" fill="#FFFFFF" />
        <rect x="0" y="0" width="1" height="1" fill="#000000" />
        </g>
        <line x1="-2.5" y1="2.5" x2="3.5" y2="2.5" stroke="#FF5555" stroke-width="1" stroke-linecap="square"/>
        <rect x="-4" y="1" width="1" height="1" fill="#FF5555" />
        <rect x="4" y="1" width="1" height="1" fill="#FF5555" />
        </g>
        <!-- Instancia de star_red -->
        <g transform="translate(25, 40)">
        <polygon points="0.5000000000000002,-3.5 1.440456403667957,-0.7944271909999161 4.304226065180615,-0.7360679774997896 2.0216904260722455,0.9944271909999158 2.8511410091698925,3.73606797749979 0.5000000000000001,2.1 -1.851141009169892,3.73606797749979 -1.0216904260722457,0.994427190999916 -3.3042260651806146,-0.7360679774997891 -0.44045640366795724,-0.7944271909999159" fill="#FF5555" />
        </g>
        <!-- Instancia de rhombus_blue -->
        <g transform="translate(25, 55) rotate(45)">
        <polygon points="0.5,-4.5 3.5,0.5 0.5,5.5 -2.5,0.5" fill="#8BE9FD" />
        </g>
    </svg>
</body>
</html>
